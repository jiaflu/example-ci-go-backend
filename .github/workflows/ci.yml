name: Go Backend CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Format, Vet, Test, Coverage, Build, Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          go test ./...
          go test ./internal/... -covermode=atomic -coverprofile=reports/coverage.out
          ./scripts/coverage-report.sh reports/coverage.out 80

      - name: Enforce coverage threshold
        run: go run ./scripts/coverage-check.go reports/coverage.out 80

      - name: Run race detector
        run: go test -race ./...

      - name: Build server binary
        run: |
          mkdir -p dist
          go build -o dist/example-ci-go-backend ./cmd/server

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-architecture Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: example-ci-go-backend:ci-${{ github.sha }}
          outputs: type=oci,dest=dist/example-ci-go-backend-image.tar

      - name: Push Docker image to registry placeholder
        if: ${{ false }}
        run: |
          echo "Registry push is intentionally disabled for this demo."
          echo "When a registry is available, enable login and set push: true."
          echo "Example image: ghcr.io/jiaflu/example-ci-go-backend:${GITHUB_SHA}"

      - name: Upload CI reports
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            reports/coverage.out
            reports/coverage.txt
            reports/coverage.html
            reports/coverage-summary.md
            dist/example-ci-go-backend
            dist/example-ci-go-backend-image.tar
